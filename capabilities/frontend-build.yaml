naftiko: 1.0.0-alpha2
info:
  label: Vite Frontend Build Workflow
  description: Workflow capability for frontend developers using Vite. Combines the JavaScript API and Plugin API to support
    dev server management, production builds, preview serving, and editor integration in a unified interface. Targeted at
    build system integrators, CI/CD pipelines, and IDE plugins.
  tags:
  - Vite
  - Build Tools
  - Dev Server
  - Frontend
  - Hot Module Replacement
  - JavaScript
  - TypeScript
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    VITE_DEV_SERVER_HOST: VITE_DEV_SERVER_HOST
capability:
  consumes:
  - type: http
    namespace: vite-js-api
    baseUri: http://localhost:5173
    description: Vite development server endpoints for health checks and file serving.
    resources:
    - name: dev-server
      path: /__vite_ping
      description: Dev server health and connectivity.
      operations:
      - name: ping-dev-server
        method: GET
        description: Ping the Vite dev server to confirm it is running.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: string
          value: $.
    - name: editor
      path: /__open-in-editor
      description: Open a source file in the configured editor.
      operations:
      - name: open-in-editor
        method: GET
        description: Open a source file at a specific line/column in the IDE.
        inputParameters:
        - name: file
          in: query
          type: string
          required: true
          description: Relative path to the source file
        - name: line
          in: query
          type: integer
          required: false
          description: Line number to navigate to
        - name: column
          in: query
          type: integer
          required: false
          description: Column number to navigate to
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: vite-build-api
    description: Unified REST API for Vite frontend build and development workflows.
    resources:
    - path: /v1/dev-server/ping
      name: dev-server-health
      description: Check Vite dev server health.
      operations:
      - method: GET
        name: ping-dev-server
        description: Ping the Vite dev server to confirm it is running.
        call: vite-js-api.ping-dev-server
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/editor/open
      name: editor-integration
      description: Open source files in the configured IDE.
      operations:
      - method: GET
        name: open-in-editor
        description: Open a source file at a specific line/column in the IDE.
        call: vite-js-api.open-in-editor
        with:
          file: rest.file
          line: rest.line
          column: rest.column
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: vite-build-mcp
    transport: http
    description: MCP server for AI-assisted Vite build and development tooling.
    tools:
    - name: ping-vite-dev-server
      description: Check whether the Vite development server is running and healthy.
      hints:
        readOnly: true
        idempotent: true
      call: vite-js-api.ping-dev-server
      outputParameters:
      - type: object
        mapping: $.
    - name: open-source-file-in-editor
      description: Open a Vite project source file at the specified line and column in the IDE. Useful for navigating to build
        errors.
      hints:
        readOnly: true
        idempotent: true
      call: vite-js-api.open-in-editor
      with:
        file: tools.file
        line: tools.line
        column: tools.column
      outputParameters:
      - type: object
        mapping: $.

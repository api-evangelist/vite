naftiko: "1.0.0-alpha1"

info:
  label: "Vite JavaScript API"
  description: >-
    Programmatic interface for embedding Vite into build toolchains and custom
    CLI tools. Provides functions for creating the dev server, triggering
    production builds, launching preview servers, and resolving configuration.
  tags:
    - Vite
    - Build Tools
    - Dev Server
    - JavaScript
    - TypeScript
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VITE_DEV_SERVER_HOST: VITE_DEV_SERVER_HOST

capability:
  consumes:
    - type: http
      namespace: vite-js-api
      baseUri: http://localhost:5173
      description: "Vite development server endpoints for health checks and file serving."
      resources:
        - name: dev-server
          path: /__vite_ping
          description: "Dev server health and connectivity."
          operations:
            - name: ping-dev-server
              method: GET
              description: "Ping the Vite dev server to confirm it is running."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

        - name: editor
          path: /__open-in-editor
          description: "Open a source file in the configured editor."
          operations:
            - name: open-in-editor
              method: GET
              description: "Open a source file at a specific line/column in the IDE."
              inputParameters:
                - name: file
                  in: query
                  type: string
                  required: true
                  description: "Relative path to the source file"
                - name: line
                  in: query
                  type: integer
                  required: false
                  description: "Line number to navigate to"
                - name: column
                  in: query
                  type: integer
                  required: false
                  description: "Column number to navigate to"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: vite-js-rest
      resources:
        - path: /v1/dev-server/ping
          name: dev-server-ping
          description: "Check Vite dev server health."
          operations:
            - method: GET
              name: ping-dev-server
              description: "Ping the Vite dev server."
              call: "vite-js-api.ping-dev-server"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/editor/open
          name: editor-open
          description: "Open file in editor."
          operations:
            - method: GET
              name: open-in-editor
              description: "Open source file at given path in the IDE."
              call: "vite-js-api.open-in-editor"
              with:
                file: "rest.file"
                line: "rest.line"
                column: "rest.column"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: vite-js-mcp
      transport: http
      tools:
        - name: ping-dev-server
          description: "Check if the Vite dev server is running and responsive."
          hints:
            readOnly: true
            idempotent: true
          call: "vite-js-api.ping-dev-server"
          outputParameters:
            - type: object
              mapping: "$."

        - name: open-file-in-editor
          description: "Open a source file at a specific line and column in the configured IDE."
          hints:
            readOnly: true
            idempotent: true
          call: "vite-js-api.open-in-editor"
          with:
            file: "tools.file"
            line: "tools.line"
            column: "tools.column"
          outputParameters:
            - type: object
              mapping: "$."
